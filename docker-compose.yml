
services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ai_failures
    ports:
      # Bound to loopback for local dev tools (psql, GUI clients) only.
      # Containers talk to the DB over the Docker network; never publish this publicly.
      - "127.0.0.1:5434:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:${POSTGRES_PASSWORD}@timescaledb:5432/ai_failures
      ASYNC_DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@timescaledb:5432/ai_failures
      ENV: development
      SQL_ECHO: 'false'
      BOOTSTRAP_API_KEY: ${API_KEY:?Set API_KEY in .env}
      CORS_ORIGINS: http://localhost:3000,http://localhost:8501
    depends_on:
      timescaledb:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: python -m uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    ports:
      - "8501:8501"
    environment:
      FAILURE_INVESTIGATOR_ENDPOINT: http://backend:8000
      FAILURE_INVESTIGATOR_API_KEY: ${API_KEY:?Set API_KEY in .env}
    depends_on:
      - backend
    volumes:
      - .:/app

volumes:
  timescale_data:
